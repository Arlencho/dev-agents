# Worker Machine Registry
# Edit this file with your Mac Mini details after running setup-machine.sh on each.
# The orchestrator and dispatch.sh read this to know where to send work.

# Provider preference per agent role.
# dispatch.sh reads this to select the right CLI tool.
# For now all map to claude — structure is ready for other providers.
provider_preferences:
  go-backend: claude
  web-frontend: claude
  db-architect: claude
  api-designer: claude
  devops: claude
  test-engineer: claude
  security-reviewer: claude
  seo-auditor: claude
  mobile: claude
  tech-scout: claude
  default: claude

machines:
  # Your command center — runs orchestrator, reviews PRs, merges
  - name: macbook-pro
    host: localhost
    role: orchestrator
    max_agents: 6
    notes: "Primary machine. Orchestrator + security-reviewer + tech-scout"

  # Worker 1 — backend-focused
  # Uncomment and fill in after running setup-machine.sh on Mac Mini 1
  # - name: mac-mini-1
  #   host: mac-mini-1            # must match ~/.ssh/config Host entry
  #   role: worker
  #   max_agents: 4
  #   preferred_agents:
  #     - go-backend
  #     - db-architect
  #     - api-designer
  #     - devops
  #   notes: "Backend work"

  # Worker 2 — frontend-focused
  # Uncomment and fill in after running setup-machine.sh on Mac Mini 2
  # - name: mac-mini-2
  #   host: mac-mini-2            # must match ~/.ssh/config Host entry
  #   role: worker
  #   max_agents: 4
